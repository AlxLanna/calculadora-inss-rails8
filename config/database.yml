default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: desafio_credishop_development
  host: db
  username: postgres
  password: <%= ENV['POSTGRES_PASSWORD'] %>

test:
  <<: *default
  database: desafio_credishop_test
  host: db
  username: postgres
  password: <%= ENV['POSTGRES_PASSWORD'] %>

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV['DATABASE_URL'] %>
  cache:
    <<: *primary_production
    database: app_production_cache # Você pode querer mudar este nome também
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: app_production_queue # Você pode querer mudar este nome também
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: app_production_cable # Você pode querer mudar este nome também
    migrations_paths: db/cable_migrate
